services:
  webbase:
    build: .
    container_name: webbase
    restart: unless-stopped
    ports:
      # Host:Container — change the left side to publish on a different port.
      - "5174:5174"
    environment:
      - PORT=5174
      - HOST=0.0.0.0
    # If your MySQL server runs on the host (not in another container),
    # uncomment this so the container can reach it via `host.docker.internal`:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
